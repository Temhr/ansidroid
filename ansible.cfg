# =============================================================================
# ansible.cfg — Ansible configuration for ansible-pull runs
#
# This file is picked up automatically by Ansible when it runs from the
# directory where the repo is checked out (typically ~/ansidroid/).
# =============================================================================

[defaults]
# Run against localhost only — ansible-pull model.
inventory           = inventory

# Where to find roles.
roles_path          = roles

# Suppress the "Python interpreter not found" warning on Termux.
interpreter_python  = auto_silent

# Don't create .retry files — they clutter the checkout directory.
retry_files_enabled = False

# Log to the ansible state directory on the device.
log_path            = ~/.ansible/ansible-pull.log

# Reduce verbosity in cron logs — set to 1 or 2 for debugging.
verbosity           = 0

# Don't check host keys when connecting to localhost.
host_key_checking   = False

[ssh_connection]
# Not strictly needed (we use connection: local) but good to have.
pipelining          = True
