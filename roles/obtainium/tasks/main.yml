---
# =============================================================================
# roles/obtainium/tasks/main.yml — manage Obtainium app list
#
# Pushes per-device apps.json to the Obtainium data directory.
# Obtainium must be installed and opened at least once before this role runs
# so Android creates its data directory.
# =============================================================================

- name: Set Obtainium data path
  set_fact:
    obtainium_data_dir: "/sdcard/Android/data/dev.imranr.obtainium/files"

- name: Deploy Obtainium app list
  block:
    - name: Ensure Obtainium data directory exists
      file:
        path: "{{ obtainium_data_dir }}"
        state: directory
        mode: "0755"

    - name: Push per-device app list
      copy:
        src: "{{ playbook_dir }}/files/obtainium/{{ obtainium_config }}"
        dest: "{{ obtainium_data_dir }}/app_list.json"
        mode: "0644"

    - name: Log successful deployment
      lineinfile:
        path: "{{ ansible_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | obtainium config pushed"
        create: true

  rescue:
    - name: Log Obtainium deploy failure
      lineinfile:
        path: "{{ ansible_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: obtainium deploy failed — {{ ansible_failed_result.msg | default('unknown') }} — open Obtainium at least once if directory is missing"
        create: true
  # Most common failure: Obtainium has never been opened so /sdcard/Android/data/
  # dev.imranr.obtainium/files does not exist yet. Open the app once to fix.
