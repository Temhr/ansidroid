---
# =============================================================================
# roles/syncthing/tasks/main.yml — deploy and manage Syncthing (p8p only)
# =============================================================================

- name: Deploy Syncthing configuration
  block:
    - name: Ensure Syncthing config directory exists
      file:
        path: "{{ ansible_env.HOME }}/.config/syncthing"
        state: directory
        mode: "0700"

    - name: Deploy config.xml from template
      template:
        src: syncthing_config.xml.j2
        dest: "{{ ansible_env.HOME }}/.config/syncthing/config.xml"
        mode: "0600"
        backup: true

  rescue:
    - name: Log Syncthing config failure
      lineinfile:
        path: "{{ ansible_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: Syncthing config deploy failed — {{ ansible_failed_result.msg | default('unknown') }} — existing config unchanged"
        create: true

- name: Configure Syncthing boot start script
  block:
    - name: Install Syncthing Termux:Boot script
      copy:
        dest: "{{ ansible_env.HOME }}/.termux/boot/start-syncthing.sh"
        mode: "0755"
        content: |
          #!/data/data/com.termux/files/usr/bin/sh
          # Managed by ansible-pull (roles/syncthing) — do not edit manually.
          syncthing serve --no-browser --no-restart &

  rescue:
    - name: Log boot script failure
      lineinfile:
        path: "{{ ansible_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: Syncthing boot script failed — Syncthing will not auto-start after reboot"
        create: true

- name: Ensure Syncthing is running
  block:
    - name: Check if Syncthing is running
      command: pgrep -x syncthing
      register: syncthing_running
      failed_when: false
      changed_when: false

    - name: Start Syncthing if not running
      shell: >
        nohup syncthing serve --no-browser --no-restart
        >> {{ ansible_env.HOME }}/.ansible/syncthing.log 2>&1 &
      when: syncthing_running.rc != 0

  rescue:
    - name: Log Syncthing start failure
      lineinfile:
        path: "{{ ansible_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: could not start Syncthing daemon — {{ ansible_failed_result.msg | default('unknown') }}"
        create: true
