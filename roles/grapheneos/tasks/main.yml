---
# =============================================================================
# roles/grapheneos/tasks/main.yml — GrapheneOS-specific tasks (p8p only)
# =============================================================================

- name: Write GrapheneOS setup checklist
  block:
    - name: Log hardening checklist
      lineinfile:
        path: "{{ ansible_state_dir }}/setup_checklist.txt"
        line: "{{ item }}"
        create: true
      loop:
        - "[ ] Settings > Network > Private DNS: set to your preferred DoT resolver"
        - "[ ] Settings > Security > Auto-reboot: enable (72h recommended)"
        - "[ ] Settings > Security > PIN scrambling: enable"
        - "[ ] Settings > Apps > Sandboxed Google Play: install only if needed"
        - "[ ] Install Termux:Boot and open it once to activate boot permission"
        - "[ ] Install Termux:API and open it once to activate API permissions"
  rescue:
    - name: Log checklist write failure
      debug:
        msg: "WARN: could not write setup checklist on {{ device_label }} — {{ ansible_failed_result.msg | default('unknown') }}"

- name: Verify Termux:API availability
  block:
    - name: Check for termux-notification binary
      command: which termux-notification
      register: termux_api_check
      failed_when: false
      changed_when: false

    - name: Warn if Termux:API is missing
      debug:
        msg: >
          termux-notification not found on {{ device_label }}.
          Install Termux:API from F-Droid and open it once, then re-run ansible-pull.
      when: termux_api_check.rc != 0
  rescue:
    - debug:
        msg: "WARN: Termux:API check failed — {{ ansible_failed_result.msg | default('unknown') }}"
