---
# =============================================================================
# roles/common/tasks/packages.yml — safe package update and upgrade
#
# Every operation is wrapped in block/rescue so a network outage, a broken
# mirror, or a bad upgrade cannot abort the rest of the playbook.
# Failures are logged with a clear message and execution continues.
#
# Upgrade strategies (set per device in host_vars):
#   conservative  →  pkg upgrade --no-full-upgrade  (safe; p8p, p3axl)
#   full          →  pkg upgrade                    (all-or-nothing; pxl)
#   skip          →  never upgrades, only installs  (legacy hardware; n5x)
# =============================================================================

# ---------------------------------------------------------------------------
# Build the full package list: common.txt merged with host extra_packages
# ---------------------------------------------------------------------------
- name: Read and merge package lists
  block:
    - name: Read common package list
      set_fact:
        common_pkg_list: >-
          {{
            lookup('file', common_packages_file)
            .splitlines()
            | reject('match', '^#')
            | reject('equalto', '')
            | list
          }}

    - name: Merge common and device-specific package lists
      set_fact:
        all_packages: "{{ common_pkg_list + (extra_packages | default([])) }}"

  rescue:
    - name: Log package list read failure
      lineinfile:
        path: "{{ upgrade_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: failed to read package list — {{ ansible_failed_result.msg | default('unknown') }}"
        create: true
    - name: Set empty fallback package list so later tasks don't crash
      set_fact:
        all_packages: []

# ---------------------------------------------------------------------------
# Update package index — isolated so a network failure only skips upgrades,
# not the rest of the playbook
# ---------------------------------------------------------------------------
- name: Update Termux package index
  block:
    - name: Run pkg update
      command: pkg update -y
      register: pkg_update_result
      changed_when: "'Get:' in pkg_update_result.stdout"

  rescue:
    - name: Log pkg update failure
      lineinfile:
        path: "{{ upgrade_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: pkg update failed (no network?) — skipping upgrade"
        create: true
    # Do not re-raise — carry on to install tasks which may still work
    # if the local cache is fresh enough.

# ---------------------------------------------------------------------------
# Snapshot installed packages before any upgrade
# ---------------------------------------------------------------------------
- name: Snapshot pre-upgrade package state
  block:
    - name: Write package snapshot
      shell: pkg list-installed 2>/dev/null > {{ pkg_state_file }}
      changed_when: false
  rescue:
    - debug:
        msg: "WARN: could not write package snapshot to {{ pkg_state_file }}"
  when: upgrade_strategy != 'skip'

# ---------------------------------------------------------------------------
# Upgrade — each strategy in its own block so one failure doesn't cascade
# ---------------------------------------------------------------------------
- name: Upgrade packages (conservative)
  block:
    - name: Run conservative upgrade
      command: pkg upgrade -y --no-full-upgrade
      register: pkg_upgrade_result
      changed_when: "'upgraded' in (pkg_upgrade_result.stdout | default(''))"
  rescue:
    - name: Log conservative upgrade failure
      lineinfile:
        path: "{{ upgrade_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: conservative upgrade failed — {{ ansible_failed_result.msg | default('unknown') }}"
        create: true
  when: upgrade_strategy == 'conservative'

- name: Upgrade packages (full)
  block:
    - name: Run full upgrade
      command: pkg upgrade -y
      register: pkg_upgrade_result
      changed_when: "'upgraded' in (pkg_upgrade_result.stdout | default(''))"
  rescue:
    - name: Log full upgrade failure
      lineinfile:
        path: "{{ upgrade_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: full upgrade failed — {{ ansible_failed_result.msg | default('unknown') }}"
        create: true
  when: upgrade_strategy == 'full'

# ---------------------------------------------------------------------------
# Install all required packages — each package individually so one bad
# package name doesn't block the rest of the list
# ---------------------------------------------------------------------------
- name: Install required packages
  block:
    - name: Install package
      command: pkg install -y {{ item }}
      loop: "{{ all_packages }}"
      register: pkg_install_result
      changed_when: "'Installing' in (pkg_install_result.stdout | default(''))"
      failed_when: false   # individual failures captured in results, not raised
    - name: Report any failed package installs
      lineinfile:
        path: "{{ upgrade_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | WARN: failed to install {{ item.item }} (rc={{ item.rc }})"
        create: true
      loop: "{{ pkg_install_result.results | default([]) }}"
      when: item.rc != 0
  rescue:
    - name: Log package install block failure
      lineinfile:
        path: "{{ upgrade_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: package install block failed — {{ ansible_failed_result.msg | default('unknown') }}"
        create: true

# ---------------------------------------------------------------------------
# Audit log entry
# ---------------------------------------------------------------------------
- name: Log upgrade summary
  lineinfile:
    path: "{{ upgrade_log_file }}"
    line: >-
      {{ ansible_date_time.iso8601 }}
      | {{ device_label }}
      | strategy={{ upgrade_strategy }}
      | rc={{ pkg_upgrade_result.rc | default('skipped') }}
    create: true
  failed_when: false

# ---------------------------------------------------------------------------
# Sanity check — warn (don't abort) if Ansible itself broke during upgrade
# ---------------------------------------------------------------------------
- name: Verify ansible still works post-upgrade
  block:
    - name: Check ansible version
      command: ansible --version
      changed_when: false
  rescue:
    - name: Warn that ansible may be broken
      debug:
        msg: >
          WARNING: ansible --version failed on {{ device_label }} after upgrade.
          SSH in and run: pkg install -y ansible
