---
# =============================================================================
# roles/common/tasks/logging.yml — log rotation
# =============================================================================

- name: Configure log rotation
  block:
    - name: Ensure ansible-pull log file exists
      file:
        path: "{{ ansible_log_file }}"
        state: touch
        mode: "0644"
        modification_time: preserve
        access_time: preserve

    - name: Install nightly log rotation cron job
      cron:
        name: "Rotate ansible-pull.log"
        hour: "3"
        minute: "15"
        job: >
          tail -n {{ log_max_lines }} {{ ansible_log_file }}
          > {{ ansible_log_file }}.tmp
          && mv {{ ansible_log_file }}.tmp {{ ansible_log_file }}

  rescue:
    - name: Log logging-setup failure
      debug:
        msg: "WARN: could not configure log rotation on {{ device_label }} — {{ ansible_failed_result.msg | default('unknown') }}"
  # Non-critical: a failure here just means logs might grow large.
