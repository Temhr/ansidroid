---
# =============================================================================
# roles/common/tasks/dotfiles.yml — deploy shell configuration
# =============================================================================

- name: Deploy dotfiles
  block:
    - name: Deploy .bashrc from template
      template:
        src: bashrc.j2
        dest: "{{ ansible_env.HOME }}/.bashrc"
        mode: "0644"
        backup: true   # keeps .bashrc~ so a bad template is recoverable

    - name: Deploy .profile
      copy:
        dest: "{{ ansible_env.HOME }}/.profile"
        mode: "0644"
        content: |
          # Managed by ansible-pull — do not edit manually.
          [ -f "$HOME/.bashrc" ] && . "$HOME/.bashrc"

  rescue:
    - name: Log dotfiles failure
      lineinfile:
        path: "{{ ansible_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: dotfiles role failed — {{ ansible_failed_result.msg | default('unknown') }} — existing .bashrc unchanged"
        create: true
  # On failure the existing .bashrc is left in place (backup: true ensures
  # the previous version is preserved as .bashrc~).
