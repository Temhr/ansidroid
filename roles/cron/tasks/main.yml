---
# =============================================================================
# roles/cron/tasks/main.yml — install and maintain the ansible-pull loop
# =============================================================================

- name: Deploy run-pull.sh wrapper script
  block:
    - name: Render run-pull.sh from template
      template:
        src: run-pull.sh.j2
        dest: "{{ ansible_state_dir }}/run-pull.sh"
        mode: "0755"
  rescue:
    - name: Log run-pull.sh deploy failure
      lineinfile:
        path: "{{ ansible_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: failed to deploy run-pull.sh — {{ ansible_failed_result.msg | default('unknown') }}"
        create: true
  # If this fails the existing run-pull.sh (from a previous pull) stays in
  # place, so the cron loop continues working on the old version.

- name: Install hourly ansible-pull cron job
  block:
    - name: Add cron entry
      cron:
        name: "ansible-pull hourly sync"
        hour: "{{ cron_hour }}"
        minute: "{{ 59 | random(seed=device_name) }}"
        job: >
          {{ ansible_state_dir }}/run-pull.sh
          >> {{ ansible_log_file }} 2>&1
  rescue:
    - name: Log cron install failure
      lineinfile:
        path: "{{ ansible_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: failed to install cron job — {{ ansible_failed_result.msg | default('unknown') }}"
        create: true

- name: Configure Termux:Boot crond start script
  block:
    - name: Ensure Termux boot directory exists
      file:
        path: "{{ ansible_env.HOME }}/.termux/boot"
        state: directory
        mode: "0755"

    - name: Install crond boot script
      copy:
        dest: "{{ ansible_env.HOME }}/.termux/boot/start-crond.sh"
        mode: "0755"
        content: |
          #!/data/data/com.termux/files/usr/bin/sh
          # Managed by ansible-pull (roles/cron) — do not edit manually.
          crond

  rescue:
    - name: Log Termux:Boot setup failure
      lineinfile:
        path: "{{ ansible_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | ERROR: Termux:Boot script setup failed — crond will not start on reboot — {{ ansible_failed_result.msg | default('unknown') }}"
        create: true
  # Termux:Boot app must be installed and opened at least once.
  # If it isn't, the directory write may fail — logged but not fatal.
