---
# =============================================================================
# roles/notifications/tasks/main.yml — failure alerts via Termux:API (p8p only)
# =============================================================================

- name: Send failure notification if sentinel exists
  block:
    - name: Check for pull failure sentinel file
      stat:
        path: "{{ ansible_state_dir }}/last_pull_failed"
      register: failure_sentinel

    - name: Send failure notification
      command: >
        termux-notification
        --id 1001
        --title "ansible-pull failed on {{ device_label }}"
        --content "Check ~/.ansible/ansible-pull.log for details."
        --priority {{ notification_priority }}
        --channel {{ notification_channel }}
      when: failure_sentinel.stat.exists

    - name: Clear failure sentinel after notifying
      file:
        path: "{{ ansible_state_dir }}/last_pull_failed"
        state: absent
      when: failure_sentinel.stat.exists

  rescue:
    - name: Log notification failure
      lineinfile:
        path: "{{ ansible_log_file }}"
        line: "{{ ansible_date_time.iso8601 }} | {{ device_label }} | WARN: notification send failed — is Termux:API installed and opened? — {{ ansible_failed_result.msg | default('unknown') }}"
        create: true
  # Notification failure is never fatal — the pull succeeds regardless.
